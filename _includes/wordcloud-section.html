<!-- Interactive Word Cloud Section -->
<div id="wc-section">
  <h1>What's Your AI Concern?</h1>
  <p class="wc-desc">
    I'm researching AI security &amp; privacy. Share what concerns you most &mdash; your response joins the word cloud below.
  </p>

  <form id="wc-form">
    <input
      type="text"
      id="wc-input"
      placeholder="e.g., data leakage, deepfakes, surveillance..."
      maxlength="200"
      required
    >
    <button type="submit" id="wc-btn">Submit</button>
  </form>

  <div id="wc-status"></div>

  <div id="wc-cloud-wrap">
    <canvas id="wc-canvas"></canvas>
  </div>

  <p id="wc-footer">
    <span id="wc-count">0</span> responses collected
  </p>
</div>

<style>
  #wc-section {
    margin-top: 2em;
  }
  .wc-desc {
    color: var(--global-text-color-light);
    margin-bottom: 1.2em;
  }
  #wc-form {
    display: flex;
    gap: 8px;
    margin-bottom: 1.2em;
  }
  #wc-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--global-border-color);
    border-radius: 8px;
    background: var(--global-bg-color);
    color: var(--global-text-color);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  #wc-input:focus {
    border-color: var(--global-link-color);
  }
  #wc-btn {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    background: var(--global-link-color);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  #wc-btn:hover { opacity: 0.85; }
  #wc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #wc-status {
    font-size: 14px;
    color: var(--global-text-color-light);
    margin-bottom: 0.8em;
    min-height: 1.2em;
  }
  #wc-cloud-wrap {
    border: 1px solid var(--global-border-color);
    border-radius: 12px;
    padding: 16px;
    background: var(--global-footer-bg-color);
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wc-canvas {
    display: block;
    width: 100%;
  }
  #wc-footer {
    font-size: 12px;
    color: var(--global-text-color-light);
    margin-top: 8px;
    text-align: right;
  }
  @media (max-width: 600px) {
    #wc-form { flex-direction: column; }
    #wc-btn { width: 100%; }
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
<script>
(function() {
  var API_URL = '{{ site.wordcloud_api_url }}';
  var canvas = document.getElementById('wc-canvas');
  var form = document.getElementById('wc-form');
  var input = document.getElementById('wc-input');
  var btn = document.getElementById('wc-btn');
  var statusEl = document.getElementById('wc-status');
  var countEl = document.getElementById('wc-count');

  var STOP_WORDS = new Set([
    'a','an','the','and','or','but','in','on','at','to','for','of','with',
    'by','from','is','it','this','that','are','was','were','be','been',
    'being','have','has','had','do','does','did','will','would','could',
    'should','may','might','can','i','me','my','we','our','you','your',
    'they','them','their','he','she','his','her','its','not','no','so',
    'if','about','how','what','which','who','when','where','why','all',
    'each','every','both','few','more','most','other','some','such','than',
    'too','very','just','also','as','into','like','through','after','before',
    'think','about','really','much','many','well','because','there'
  ]);

  function isDark() {
    return document.documentElement.getAttribute('data-theme') === 'dark';
  }

  function getColors() {
    return isDark()
      ? ['#58a6ff','#79c0ff','#3fb950','#d29922','#f85149','#bc8cff','#ff7b72']
      : ['#0969da','#0550ae','#1a7f37','#bf8700','#cf222e','#8250df','#e16f24'];
  }

  function processWords(texts) {
    var freq = {};
    texts.forEach(function(text) {
      text.toLowerCase()
        .replace(/[^a-z0-9\s\-]/g, ' ')
        .split(/\s+/)
        .filter(function(w) { return w.length > 2 && !STOP_WORDS.has(w); })
        .forEach(function(w) { freq[w] = (freq[w] || 0) + 1; });
    });
    return Object.entries(freq)
      .sort(function(a, b) { return b[1] - a[1]; })
      .slice(0, 80)
      .map(function(e) { return [e[0], e[1]]; });
  }

  function renderCloud(words) {
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!words.length) {
      ctx.fillStyle = isDark() ? '#8b949e' : '#656d76';
      ctx.font = '16px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Be the first to share your concern!', canvas.width / 2, canvas.height / 2);
      return;
    }

    var maxCount = Math.max.apply(null, words.map(function(w) { return w[1]; }));
    var colors = getColors();

    WordCloud(canvas, {
      list: words,
      gridSize: Math.round(8 * (canvas.width / 600)),
      weightFactor: function(size) {
        var scale = canvas.width / 600;
        return Math.max(13, (size / maxCount) * 48 * scale);
      },
      fontFamily: 'Inter, -apple-system, sans-serif',
      fontWeight: 600,
      color: function() { return colors[Math.floor(Math.random() * colors.length)]; },
      rotateRatio: 0.25,
      rotationSteps: 2,
      backgroundColor: 'transparent',
      shuffle: true,
      drawOutOfBound: false,
    });
  }

  function resizeCanvas() {
    var wrap = canvas.parentElement;
    canvas.width = wrap.clientWidth - 32;
    canvas.height = Math.max(220, Math.min(350, window.innerHeight * 0.3));
  }

  var cachedData = null;

  function loadCloud() {
    resizeCanvas();
    if (cachedData) {
      countEl.textContent = cachedData.length;
      renderCloud(processWords(cachedData.map(function(d) { return d.text; })));
      return;
    }
    if (!API_URL) { renderCloud([]); return; }

    fetch(API_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        cachedData = data;
        countEl.textContent = data.length;
        renderCloud(processWords(data.map(function(d) { return d.text; })));
      })
      .catch(function() { renderCloud([]); });
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var text = input.value.trim();
    if (!text || !API_URL) return;

    btn.disabled = true;
    btn.textContent = '...';

    fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ text: text })
    }).then(function() {
      input.value = '';
      statusEl.textContent = 'Thanks for sharing! ✓';
      setTimeout(function() { statusEl.textContent = ''; }, 3000);
      if (cachedData) { cachedData.push({ text: text }); }
      else { cachedData = [{ text: text }]; }
      loadCloud();
    }).catch(function() {
      statusEl.textContent = 'Something went wrong. Please try again.';
    }).finally(function() {
      btn.disabled = false;
      btn.textContent = 'Submit';
    });
  });

  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(loadCloud, 200);
  });

  new MutationObserver(function() { loadCloud(); })
    .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  loadCloud();
})();
</script>
