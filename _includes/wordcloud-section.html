<!-- Full-screen Landing Splash -->
<div id="wc-splash">
  <div class="wc-blob wc-blob-1"></div>
  <div class="wc-blob wc-blob-2"></div>
  <div class="wc-blob wc-blob-3"></div>
  <div class="wc-blob wc-blob-4"></div>

  <div id="wc-splash-inner">
    <h1 id="wc-title">Hi, I'm Hobin 👋</h1>
    <p id="wc-subtitle">
      Ph.D. student at CMU, working on AI security &amp; privacy.
    </p>

    <div id="wc-buttons">
      <button class="wc-landing-btn wc-btn-primary" onclick="closeSplash()">
        Enter My Website
      </button>
      <a class="wc-landing-btn wc-btn-secondary" href="{{ base_path }}/ai-concern/">
        Share Your AI Concern
      </a>
    </div>
  </div>
</div>

<style>
#wc-splash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: opacity 0.6s ease, transform 0.6s ease;
  background: linear-gradient(135deg, #e8f0fe 0%, #f5f0ff 40%, #fff 100%);
}
html[data-theme="dark"] #wc-splash {
  background: linear-gradient(135deg, #0d1117 0%, #161b2e 40%, #1a1025 100%);
}
#wc-splash.hide {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}

.wc-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.5;
  animation: blobFloat 8s ease-in-out infinite alternate;
}
html[data-theme="dark"] .wc-blob { opacity: 0.25; }

.wc-blob-1 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #a5d8ff, #d0bfff);
  top: -10%; left: -5%;
}
.wc-blob-2 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, #bac8ff, #eebefa);
  bottom: -8%; right: -3%;
  animation-delay: -2s;
}
.wc-blob-3 {
  width: 250px; height: 250px;
  background: radial-gradient(circle, #c3fae8, #a5d8ff);
  top: 20%; right: 10%;
  animation-delay: -4s;
}
.wc-blob-4 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #eebefa, #fcc2d7);
  bottom: 15%; left: 8%;
  animation-delay: -6s;
}

html[data-theme="dark"] .wc-blob-1 { background: radial-gradient(circle, #1c3a5e, #2d1b69); }
html[data-theme="dark"] .wc-blob-2 { background: radial-gradient(circle, #1b2a6e, #3b1f5e); }
html[data-theme="dark"] .wc-blob-3 { background: radial-gradient(circle, #0f3b3d, #1c3a5e); }
html[data-theme="dark"] .wc-blob-4 { background: radial-gradient(circle, #3b1f5e, #5c1a3e); }

@keyframes blobFloat {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(30px, -25px) scale(1.08); }
}

#wc-splash-inner {
  position: relative;
  z-index: 1;
  text-align: center;
  animation: fadeUp 0.8s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

#wc-title {
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  margin: 0 0 0.3em;
  background: linear-gradient(135deg, #0969da, #8250df);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
html[data-theme="dark"] #wc-title {
  background: linear-gradient(135deg, #79c0ff, #bc8cff);
  -webkit-background-clip: text;
  background-clip: text;
}

#wc-subtitle {
  font-size: 1.15rem;
  line-height: 1.6;
  color: #656d76;
  margin: 0 0 2.2em;
}
html[data-theme="dark"] #wc-subtitle { color: #8b949e; }

#wc-buttons {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeUp 0.8s ease both;
  animation-delay: 0.3s;
}

.wc-landing-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 16px 32px;
  border-radius: 14px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  text-decoration: none;
  border: none;
}
.wc-landing-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.12);
}

.wc-btn-primary {
  background: linear-gradient(135deg, #0969da, #8250df);
  color: #fff;
}
.wc-btn-secondary {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,0,0,0.08) !important;
  color: #1f2328;
}
html[data-theme="dark"] .wc-btn-secondary {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.12) !important;
  color: #e6edf3;
}
html[data-theme="dark"] .wc-landing-btn:hover {
  box-shadow: 0 8px 28px rgba(0,0,0,0.4);
}

@media (max-width: 480px) {
  #wc-buttons { flex-direction: column; align-items: center; }
  .wc-landing-btn { width: 80%; }
}
</style>

<script>
function closeSplash() {
  var splash = document.getElementById('wc-splash');
  splash.classList.add('hide');
  document.body.style.overflow = '';
  setTimeout(function() { splash.style.display = 'none'; }, 700);
  try { sessionStorage.setItem('wc-seen', '1'); } catch(e) {}
}
(function() {
  try {
    if (sessionStorage.getItem('wc-seen')) {
      document.getElementById('wc-splash').style.display = 'none';
      return;
    }
  } catch(e) {}
  document.body.style.overflow = 'hidden';
})();
</script>
